index:
  title: Slides
  favicon: stylesheets/watermelon.svg
  theme: stylesheets/index.css
slides:
  favicon: stylesheets/watermelon.svg
  theme: stylesheets/slides.css
  highlight_theme: vs
  preprocess_script: preprocess_math.py
  separator: ^\s*---\s*$
  separator_vertical: ^\s*-v-\s*$
  separator_notes: "^Notes?:"
revealjs:
  height: 1080
  width: 1920
  transition: fade
  markdown:
    gfm: false
  mathjax3:
    tex:
      inlineMath:
        - ["$", "$"]
        - ["\\(", "\\)"]
      displayMath:
        - ["$$", "$$"]
        - ["\\[", "\\]"]
plugins:
  - name: RevealMath.MathJax3
    extra_javascript:
      - https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/math/math.js
  - name: RevealMermaid
    extra_javascript:
      - https://cdn.jsdelivr.net/npm/reveal.js-mermaid-plugin/plugin/mermaid/mermaid.min.js
  - extra_javascript:
      - https://cdn.jsdelivr.net/npm/reveal-plantuml/dist/reveal-plantuml.min.js